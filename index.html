          <Lbl label="Lead Source"><Sel value={f.source} onChange={s("source")} options={SOURCES}/></Lbl>
          
          <Lbl label="Assigned To">
            <select value={f.assigned_rep_id} onChange={s("assigned_rep_id")} style={{width:"100%",padding:"8px 10px",border:`1px solid ${C.border}`,borderRadius:6,fontSize:12.5,background:"#fff"}}>
              {users.map(u=><option key={u.id} value={u.id}>{u.full_name} ({u.role})</option>)}
            </select>
          </Lbl>

          {/* Delete section — Admin only */}
          {isAdmin&&(
            <div style={{background:"#FFF5F5",border:"1px solid #F5C4C4",borderRadius:8,padding:"14px 16px",marginTop:4}}>
              <div style={{fontSize:12,fontWeight:700,color:"#8B2020",marginBottom:8}}>⚠️ Danger Zone — Admin Only</div>
              {!confirmDelete?(
                <button onClick={()=>setConfirmDelete(true)}
                  style={{background:"#8B2020",color:"#fff",border:"none",borderRadius:7,padding:"8px 16px",fontSize:12.5,fontWeight:700,cursor:"pointer"}}>
                  🗑️ Delete This Contact
                </button>
              ):(
                <div>
                  <div style={{fontSize:12.5,color:"#8B2020",marginBottom:10,fontWeight:600}}>
                    Are you sure? This will permanently delete <strong>{contact.first_name} {contact.last_name}</strong> and ALL their notes, activities, and history. This cannot be undone.
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={handleDelete} disabled={deleting}
                      style={{background:"#8B2020",color:"#fff",border:"none",borderRadius:7,padding:"8px 16px",fontSize:12.5,fontWeight:700,cursor:"pointer",opacity:deleting?0.6:1}}>
                      {deleting?"Deleting…":"Yes, Delete Permanently"}
                    </button>
                    <button onClick={()=>setConfirmDelete(false)}
                      style={{background:"#fff",color:C.text,border:`1px solid ${C.border}`,borderRadius:7,padding:"8px 16px",fontSize:12.5,fontWeight:700,cursor:"pointer"}}>
                      Cancel
                    </button>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>

        {/* Footer buttons */}
        <div style={{padding:"12px 20px 20px",display:"flex",gap:10,borderTop:`1px solid ${C.border}`,background:"#FBF9F3",position:"sticky",bottom:0}}>
          <Btn primary onClick={save} disabled={saving||!f.first_name||!f.last_name} style={{flex:1,justifyContent:"center",padding:"11px"}}>
            {saving?"Saving…":"💾 Save Changes"}
          </Btn>
          <Btn onClick={onClose} style={{flex:1,justifyContent:"center",padding:"11px"}}>Cancel</Btn>
        </div>
      </div>
    </div>
  );
}


// ── Login ────────────────────────────────────────────────────────
function Login({onLogin}){
  const [email,setEmail]=React.useState("sastotts@hotmail.com");
  const [pass,setPass]=React.useState("");
  const [err,setErr]=React.useState("");
  const [loading,setLoading]=React.useState(false);
  const doLogin=async()=>{
    if(!pass){setErr("Please enter your password.");return;}
    setLoading(true);setErr("");
    const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error){setErr(error.message);setLoading(false);return;}
    const {data:profile}=await sb.from("users").select("*").eq("id",data.user.id).single();
    onLogin(data.session,data.user,profile);
    setLoading(false);
  };
  return(
    <div style={{height:"100vh",background:C.dark,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:C.cream,borderRadius:14,padding:"40px 38px",width:400,boxShadow:"0 20px 60px rgba(0,0,0,0.4)"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:28}}>
          <img src={SS_LOGO} alt="SS Logo" style={{width:44,height:44,borderRadius:9,objectFit:"cover",background:"#F4EFE6"}}/>
          <div>
            <div style={{fontSize:18,fontWeight:700,color:C.dark}}>S&S Contracting</div>
            <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:0.5}}>Roofing · Gutters · Outdoor Living</div>
          </div>
        </div>
        <ErrBox msg={err}/>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <Lbl label="Email"><Inp value={email} onChange={e=>setEmail(e.target.value)} type="email"/></Lbl>
          <Lbl label="Password"><Inp value={pass} onChange={e=>setPass(e.target.value)} type="password" placeholder="Enter your password"/></Lbl>
          <button onClick={doLogin} disabled={loading} style={{padding:"11px",background:C.rust,color:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:700,cursor:loading?"not-allowed":"pointer",marginTop:4,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            {loading?<><span className="spin" style={{display:"inline-block",width:16,height:16,border:"2px solid rgba(255,255,255,0.3)",borderTop:"2px solid #fff",borderRadius:"50%"}}/> Signing in…</>:"Sign In →"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Main App ─────────────────────────────────────────────────────
function App(){
  const [session,setSession]=React.useState(null);
  const [authUser,setAuthUser]=React.useState(null);
  const [dbUser,setDbUser]=React.useState(null);
  const [contacts,setContacts]=React.useState(null);
  const [selected,setSelected]=React.useState(null);
  const [activities,setActivities]=React.useState(null);
  const [users,setUsers]=React.useState([]);
  const [notes,setNotes]=React.useState([]);
  const [search,setSearch]=React.useState("");
  const [view,setView]=React.useState("contacts");
  const [activeTab,setActiveTab]=React.useState("Notes");
  const [newNote,setNewNote]=React.useState("");
  const [savingNote,setSavingNote]=React.useState(false);
  const [showNewContact,setShowNewContact]=React.useState(false);
  const [showNewActivity,setShowNewActivity]=React.useState(false);
  const [showReassign,setShowReassign]=React.useState(false);
  const [showEditContact,setShowEditContact]=React.useState(false);
  const [showEditActivity,setShowEditActivity]=React.useState(null);
  const [showEmail,setShowEmail]=React.useState(false);
  const [showGutterProposal,setShowGutterProposal]=React.useState(false);
  const [showRoofProposal,setShowRoofProposal]=React.useState(false);
  const [showMiscProposal,setShowMiscProposal]=React.useState(false);
  const [showActivityDetail,setShowActivityDetail]=React.useState(null);
  const [showDonePrompt,setShowDonePrompt]=React.useState(false);
  const [doneContact,setDoneContact]=React.useState(null);
  const [editingStatus,setEditingStatus]=React.useState(false);

  const handleLogin=async(sess,user,profile)=>{
    setSession(sess);setAuthUser(user);setDbUser(profile);
  };

  const loadAll=React.useCallback(async()=>{
    const [{data:c},{data:a},{data:u}]=await Promise.all([
      sb.from("contacts").select("*").order("created_at",{ascending:false}),
      sb.from("activities").select("*").order("due_date",{ascending:true}),
      sb.from("users").select("*").order("full_name"),
    ]);
    setContacts(c||[]);
    setActivities(a||[]);
    setUsers(u||[]);
    if(c?.length>0)setSelected(s=>s||(c[0]));
  },[]);

  const loadNotes=React.useCallback(async(contactId)=>{
    const {data}=await sb.from("notes").select("*").eq("contact_id",contactId).order("created_at",{ascending:false});
    setNotes(data||[]);
  },[]);

  React.useEffect(()=>{if(session)loadAll();},[session]);
  React.useEffect(()=>{if(selected){setNotes([]);loadNotes(selected.id);}setEditingStatus(false);},[selected?.id]);

  const saveNote=async()=>{
    if(!newNote.trim()||!selected)return;
    setSavingNote(true);
    const {data,error}=await sb.from("notes").insert({contact_id:selected.id,author_id:dbUser?.id||authUser?.id,body:newNote.trim()}).select().single();
    if(!error){setNotes(p=>[data,...p]);setNewNote("");}
    setSavingNote(false);
  };

  const updateStatus=async(status)=>{
    await sb.from("contacts").update({status}).eq("id",selected.id);
    const updated={...selected,status};
    setSelected(updated);
    setContacts(p=>p.map(c=>c.id===selected.id?updated:c));
    setEditingStatus(false);
  };

  const completeActivity=async(a)=>{
    await sb.from("activities").update({is_completed:true,completed_at:new Date().toISOString()}).eq("id",a.id);
    setActivities(p=>p.map(x=>x.id===a.id?{...x,is_completed:true}:x));
    setDoneContact(contacts?.find(c=>c.id===a.contact_id));
    setShowActivityDetail(null);
    setShowDonePrompt(true);
  };

  const deleteActivity=async(a)=>{
    await sb.from("activities").delete().eq("id",a.id);
    setActivities(p=>p.filter(x=>x.id!==a.id));
    setShowActivityDetail(null);
  };

  const signOut=async()=>{
    await sb.auth.signOut();
    setSession(null);setAuthUser(null);setDbUser(null);
    setContacts(null);setActivities(null);setSelected(null);
  };

  const filtered=(contacts||[]).filter(c=>`${c.first_name} ${c.last_name} ${c.service_type||""}`.toLowerCase().includes(search.toLowerCase()));
  const initials=dbUser?.full_name?.split(" ").map(n=>n[0]).join("").slice(0,2)||"??";

  if(!session)return<Login onLogin={handleLogin}/>;

  return(
    <div style={{fontFamily:"-apple-system,sans-serif",background:"#EFE9DC",color:C.text,height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden",fontSize:13}}>

      {/* TOP BAR */}
      <header style={{height:56,background:C.dark,display:"flex",alignItems:"center",padding:"0 16px",gap:18,flexShrink:0,borderBottom:`3px solid ${C.rust}`}}>
        <div style={{display:"flex",alignItems:"center",gap:9}}>
          <img src={SS_LOGO} alt="SS Logo" style={{width:36,height:36,borderRadius:7,objectFit:"cover",background:"#F4EFE6"}}/>
          <div>
            <div style={{fontSize:15,fontWeight:700,color:"#F4EFE6"}}>S&S Contracting</div>
            <div style={{fontSize:9.5,color:C.muted,textTransform:"uppercase",letterSpacing:0.5}}>Roofing · Gutters · Outdoor Living</div>
          </div>
        </div>
        <div style={{flex:1,maxWidth:420,display:"flex",alignItems:"center",gap:8,background:C.mid,borderRadius:6,padding:"7px 12px"}}>
          <span style={{color:C.sub}}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search contacts…" style={{border:"none",outline:"none",background:"transparent",color:"#F4EFE6",fontSize:12.5,width:"100%"}}/>
        </div>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:12}}>
          <button onClick={loadAll} title="Refresh" style={{background:C.mid,border:"none",borderRadius:6,width:32,height:32,cursor:"pointer",color:"#C4BCA8",fontSize:18}}>↺</button>
          <div style={{display:"flex",alignItems:"center",gap:7}}>
            <div style={{width:28,height:28,borderRadius:"50%",background:C.rust,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700}}>{initials}</div>
            <div>
              <div style={{fontSize:12,color:"#F4EFE6",fontWeight:600}}>{dbUser?.full_name||authUser?.email}</div>
              <div style={{fontSize:9.5,color:C.muted,textTransform:"capitalize"}}>{dbUser?.role||"user"}</div>
            </div>
          </div>
          <button onClick={signOut} style={{background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:12,fontWeight:600}}>⎋ Sign out</button>
        </div>
      </header>

      <div style={{flex:1,display:"flex",overflow:"hidden"}}>
        {/* SIDEBAR */}
        <nav style={{width:158,background:C.dark,display:"flex",flexDirection:"column",padding:"12px 8px",gap:1,flexShrink:0}}>
          {[["👥","Contacts","contacts"],["📅","Calendar","calendar"],["📈","Pipeline","pipeline"],["📞","Call Lists","calls"],["🏷️","Price Lists","prices"],["📊","Reports","reports"],["⚙️","Admin","admin"]].map(([icon,label,key])=>(
            <button key={key} onClick={()=>setView(key)} style={{display:"flex",alignItems:"center",gap:9,padding:"9px 10px",borderRadius:6,background:view===key?C.rust:"transparent",border:"none",color:view===key?"#fff":"#C4BCA8",fontSize:12.5,fontWeight:500,cursor:"pointer",textAlign:"left"}}>
              {icon} {label}
            </button>
          ))}
          <div style={{flex:1}}/>
          <div style={{padding:"10px",background:C.mid,borderRadius:8,margin:"0 2px"}}>
            <div style={{fontSize:9.5,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:7,fontWeight:600}}>Your Data</div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#E5DECB",padding:"3px 0"}}><span>Contacts</span><strong>{contacts?.length??"…"}</strong></div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#E5DECB",padding:"3px 0"}}><span>Activities</span><strong>{activities?.length??"…"}</strong></div>
          </div>
        </nav>

        {/* CONTACTS VIEW */}
        {view==="contacts"&&<>
          {/* Contact List */}
          <div style={{width:264,background:C.tan,borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",flexShrink:0}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"13px 12px 9px"}}>
              <span style={{fontSize:11,fontWeight:700,color:C.sub,textTransform:"uppercase",letterSpacing:0.5}}>Contacts ({filtered.length})</span>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>setShowReassign(true)} title="Reassign contacts" style={{background:C.indigo,border:"none",borderRadius:5,width:20,height:20,color:"#fff",cursor:"pointer",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center"}}>↔</button>
                <button onClick={()=>setShowNewContact(true)} style={{background:C.rust,border:"none",borderRadius:5,width:20,height:20,color:"#fff",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
              </div>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"0 7px 12px"}}>
              {contacts===null?<Spinner/>:filtered.length===0?(
                <div style={{textAlign:"center",padding:"30px 16px",color:C.muted,fontSize:12.5}}>{(contacts||[]).length===0?"No contacts yet. Click + to add your first customer.":"No matches found."}</div>
              ):filtered.map(c=>(
                <button key={c.id} onClick={()=>setSelected(c)} style={{width:"100%",display:"flex",gap:9,padding:"9px 8px",border:"none",background:selected?.id===c.id?"#fff":"transparent",borderRadius:8,cursor:"pointer",textAlign:"left",marginBottom:2,boxShadow:selected?.id===c.id?"0 1px 4px rgba(58,53,42,0.1)":"none"}}>
                  <div style={{width:32,height:32,borderRadius:"50%",background:avatarColor(c.first_name),color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0}}>{c.first_name?.[0]}{c.last_name?.[0]}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12.5,fontWeight:700,color:C.text}}>{c.first_name} {c.last_name}</div>
                    <div style={{fontSize:11,color:C.sub,margin:"1px 0 4px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.service_type||"—"}</div>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                      <Pill label={c.status}/>
                      <span style={{fontSize:11,fontWeight:700,color:"#5C5645"}}>${(c.estimated_value||0).toLocaleString()}</span>
                    </div>
                  </div>
                </button>
              ))}
            </div>
          </div>

          {/* Contact Detail */}
          {selected?(
            <div style={{flex:1,background:C.cream,display:"flex",flexDirection:"column",overflowY:"auto",borderRight:`1px solid ${C.border}`}}>
              <div style={{display:"flex",alignItems:"center",gap:13,padding:"18px 22px 14px",borderBottom:`1px solid ${C.border}`}}>
                <div style={{width:48,height:48,borderRadius:"50%",background:avatarColor(selected.first_name),color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:700,flexShrink:0}}>{selected.first_name?.[0]}{selected.last_name?.[0]}</div>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:9,flexWrap:"wrap"}}>
                    <h2 style={{fontSize:19,margin:0,fontWeight:700,color:C.dark}}>{selected.first_name} {selected.last_name}</h2>
                    {editingStatus?(
                      <select value={selected.status} onChange={e=>updateStatus(e.target.value)} autoFocus
                        style={{padding:"3px 8px",border:`1px solid ${C.rust}`,borderRadius:6,fontSize:12,background:"#fff",color:C.rust,fontWeight:700}}>
                        {STATUSES.map(s=><option key={s}>{s}</option>)}
                      </select>
                    ):(
                      <span onClick={()=>setEditingStatus(true)} title="Click to change status" style={{cursor:"pointer"}}><Pill label={selected.status}/></span>
                    )}
                  </div>
                  <div style={{fontSize:11.5,color:C.sub,marginTop:2}}>{selected.service_type} · {selected.source}</div>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontSize:9.5,color:C.muted,textTransform:"uppercase",letterSpacing:0.4,fontWeight:600}}>Est. Value</div>
                  <div style={{fontSize:20,fontWeight:700,color:C.sage}}>${(selected.estimated_value||0).toLocaleString()}</div>
                  <button onClick={()=>setShowEditContact(true)}
                    style={{marginTop:6,background:C.tan,border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:700,color:C.sub,cursor:"pointer",display:"flex",alignItems:"center",gap:4,marginLeft:"auto"}}>
                    ✏️ Edit Contact
                  </button>
                </div>
              </div>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px 22px",padding:"14px 22px"}}>
                {[["📞","Phone",selected.phone||"—"],["✉️","Email",selected.email||"—"],
                  ["📍","Address",[selected.address,selected.city,selected.state,selected.zip].filter(Boolean).join(", ")||"—"],
                  ["🕐","Added",selected.created_at?new Date(selected.created_at).toLocaleDateString():"—"]
                ].map(([icon,label,value])=>(
                  <div key={label} style={{display:"flex",gap:8}}>
                    <span style={{fontSize:13,marginTop:1,flexShrink:0}}>{icon}</span>
                    <div style={{minWidth:0}}>
                      <div style={{fontSize:9.5,color:C.muted,textTransform:"uppercase",letterSpacing:0.4,fontWeight:600}}>{label}</div>
                      <div style={{fontSize:12.5,color:C.text,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{value}</div>
                    </div>
                  </div>
                ))}
              </div>

              {/* Owner row */}
              <div style={{padding:"0 22px 12px",display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:11,color:C.muted,fontWeight:600}}>OWNER:</span>
                <span style={{fontSize:12.5,color:C.text,fontWeight:600}}>{users.find(u=>u.id===selected.assigned_rep_id)?.full_name||"Unassigned"}</span>
                <button onClick={()=>setShowReassign(true)} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:5,padding:"2px 8px",fontSize:11,color:C.sub,cursor:"pointer",marginLeft:4}}>Change</button>
              </div>

              <div style={{display:"flex",gap:7,padding:"4px 22px 14px",flexWrap:"wrap"}}>
                <Btn>📞 Log Call</Btn>
                <Btn onClick={()=>setShowEmail(true)}>✉️ Send Email</Btn>
                <div style={{position:"relative",display:"inline-block"}} className="proposal-menu">
                  <Btn primary onClick={()=>setShowGutterProposal(true)}>📄 Gutter Proposal</Btn>
                </div>
                <Btn onClick={()=>setShowRoofProposal(true)}>🏠 Roof Proposal</Btn>
                <Btn onClick={()=>setShowMiscProposal(true)}>🏡 Project Proposal</Btn>
                <Btn onClick={()=>setShowNewActivity(true)}>📅 Schedule</Btn>
              </div>

              <div style={{display:"flex",gap:2,padding:"0 22px",borderBottom:`1px solid ${C.border}`}}>
                {["Notes","Activities","Proposals","Documents","Email History"].map(t=>(
                  <button key={t} onClick={()=>setActiveTab(t)} style={{padding:"9px 12px",border:"none",background:"transparent",fontSize:12,fontWeight:600,color:activeTab===t?C.rust:C.muted,cursor:"pointer",borderBottom:activeTab===t?`2px solid ${C.rust}`:"2px solid transparent"}}>{t}</button>
                ))}
              </div>

              <div style={{padding:"16px 22px",flex:1}}>
                {activeTab==="Notes"&&(
                  <div>
                    <div style={{background:"#fff",border:`1px solid ${C.border}`,borderRadius:8,padding:"12px 14px",marginBottom:14}}>
                      <textarea value={newNote} onChange={e=>setNewNote(e.target.value)} placeholder="Type a note about this customer…" rows={3}
                        style={{width:"100%",border:"none",outline:"none",fontSize:12.5,resize:"none",color:C.text,boxSizing:"border-box"}}/>
                      <div style={{display:"flex",justifyContent:"flex-end",marginTop:8}}>
                        <Btn primary onClick={saveNote} disabled={!newNote.trim()||savingNote}>{savingNote?"Saving…":"💾 Save Note"}</Btn>
                      </div>
                    </div>
                    {notes.length===0
                      ?<div style={{textAlign:"center",padding:"20px 0",color:C.muted,fontSize:12.5}}>No notes yet — add one above.</div>
                      :notes.map(n=>(
                        <div key={n.id} style={{background:"#fff",border:`1px solid ${C.border}`,borderRadius:8,padding:"11px 13px",marginBottom:9}}>
                          <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                            <span style={{fontSize:11,fontWeight:700,color:C.sage}}>You</span>
                            <span style={{fontSize:11,color:C.muted}}>{new Date(n.created_at).toLocaleDateString()}</span>
                          </div>
                          <div style={{fontSize:12.5,color:C.sub,lineHeight:1.5}}>{n.body}</div>
                        </div>
                      ))
                    }
                  </div>
                )}
                {activeTab==="Activities"&&(
                  <div>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                      <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:0.5}}>All Activities</div>
                      <Btn onClick={()=>setShowNewActivity(true)} style={{padding:"5px 10px",fontSize:11.5}}>+ New Activity</Btn>
                    </div>
                    {(activities||[]).filter(a=>a.contact_id===selected.id).length===0
                      ?<div style={{textAlign:"center",padding:"24px 0",color:C.muted,fontSize:12.5}}>No activities yet for this contact.</div>
                      :(activities||[]).filter(a=>a.contact_id===selected.id)
                        .sort((a,b)=>new Date(b.due_date)-new Date(a.due_date))
                        .map(a=>{
                          const d=a.due_date?new Date(a.due_date):null;
                          const assignedUser=users.find(u=>u.id===a.assigned_user_id);
                          return(
                            <div key={a.id} onClick={()=>setShowActivityDetail(a)}
                              style={{background:"#fff",border:`1px solid ${a.is_completed?C.sage+"44":C.border}`,borderRadius:8,padding:"11px 13px",marginBottom:8,cursor:"pointer",display:"flex",gap:10,alignItems:"flex-start"}}
                              onMouseEnter={e=>e.currentTarget.style.boxShadow="0 2px 8px rgba(0,0,0,0.08)"}
                              onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
                              <div style={{fontSize:20,flexShrink:0,marginTop:1}}>
                                {a.is_completed?"✅":a.type==="call"?"📞":a.type==="meeting"?"🤝":a.type==="task"?"✅":"✉️"}
                              </div>
                              <div style={{flex:1,minWidth:0}}>
                                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                                  <div style={{fontSize:12.5,fontWeight:600,color:a.is_completed?C.muted:C.dark,textDecoration:a.is_completed?"line-through":"none"}}>{a.subject}</div>
                                  {a.is_completed
                                    ?<span style={{fontSize:9.5,fontWeight:700,color:C.sage,background:C.sage+"22",padding:"2px 7px",borderRadius:8,flexShrink:0}}>Done</span>
                                    :<span style={{fontSize:9.5,fontWeight:700,color:C.rust,background:C.rust+"22",padding:"2px 7px",borderRadius:8,flexShrink:0,textTransform:"capitalize"}}>{a.type}</span>
                                  }
                                </div>
                                <div style={{display:"flex",gap:12,marginTop:4}}>
                                  {d&&<span style={{fontSize:11,color:C.muted}}>📅 {MONTHS_SHORT[d.getMonth()]} {d.getDate()}, {d.getFullYear()} · {d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</span>}
                                  {assignedUser&&<span style={{fontSize:11,color:C.indigo}}>👤 {assignedUser.full_name}</span>}
                                </div>
                              </div>
                            </div>
                          );
                        })
                    }
                  </div>
                )}
                {activeTab==="Proposals"&&<ProposalsTab contactId={selected.id} contact={selected} dbUser={dbUser} onNew={()=>setShowGutterProposal(true)} onNewRoof={()=>setShowRoofProposal(true)} onNewMisc={()=>setShowMiscProposal(true)}/>}
                {activeTab==="Documents"&&<div style={{textAlign:"center",padding:"30px 20px",color:C.muted}}>📁<br/><br/>No documents yet.<br/>Upload contracts, photos &amp; reports — Phase 2.</div>}
                {activeTab==="Email History"&&<EmailHistoryTab contactId={selected.id}/>}
              </div>
            </div>
          ):(
            <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",background:C.cream,flexDirection:"column",gap:10,color:C.muted,fontSize:13}}>
              👥<br/>Select a contact to view details
            </div>
          )}

          {/* Activity Panel */}
          <div style={{width:248,background:C.tan,display:"flex",flexDirection:"column",flexShrink:0,padding:"13px 11px"}}>
            <div style={{marginBottom:9}}>
              <div style={{fontSize:13,fontWeight:700,color:C.dark}}>Upcoming Activities</div>
              <div style={{fontSize:11,color:C.muted,marginTop:1}}>{new Date().toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"})}</div>
            </div>
            <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:7}}>
              {activities===null?<Spinner/>:(activities||[]).length===0
                ?<div style={{textAlign:"center",padding:"20px 10px",color:C.muted,fontSize:12}}>No activities yet.</div>
                :(activities||[]).map(a=>{
                  const contact=contacts?.find(c=>c.id===a.contact_id);
                  const assignedUser=users.find(u=>u.id===a.assigned_user_id);
                  const d=a.due_date?new Date(a.due_date):null;
                  return(
                    <div key={a.id} onClick={()=>{setShowActivityDetail(a);if(contact)setSelected(contact);}}
                      style={{display:"flex",gap:8,background:"#fff",border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 10px",cursor:"pointer",transition:"box-shadow 0.15s"}}
                      onMouseEnter={e=>e.currentTarget.style.boxShadow="0 2px 8px rgba(0,0,0,0.1)"}
                      onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
                      <div style={{flexShrink:0,marginTop:1,fontSize:17}}>
                        {a.is_completed?"✅":a.type==="call"?"📞":a.type==="meeting"?"🤝":a.type==="task"?"✅":"✉️"}
                      </div>
                      <div style={{minWidth:0,flex:1}}>
                        <div style={{fontSize:11.5,fontWeight:600,lineHeight:1.4,textDecoration:a.is_completed?"line-through":"none",color:a.is_completed?C.muted:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.subject}</div>
                        {contact&&<div style={{fontSize:10.5,color:C.sage,marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{contact.first_name} {contact.last_name}</div>}
                        {assignedUser&&assignedUser.id!==dbUser?.id&&<div style={{fontSize:10,color:C.indigo,marginTop:1}}>→ {assignedUser.full_name}</div>}
                        {d&&<div style={{fontSize:10.5,color:C.muted,marginTop:1}}>{MONTHS_SHORT[d.getMonth()]} {d.getDate()} · {d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</div>}
                      </div>
                    </div>
                  );
                })
              }
            </div>
            <button onClick={()=>setShowNewActivity(true)}
              style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,background:C.dark,color:"#F4EFE6",border:"none",borderRadius:7,padding:"9px",fontSize:12,fontWeight:600,cursor:"pointer",marginTop:9}}>
              + New Activity
            </button>
            <div style={{background:"#FBF1DD",border:"1px solid #E8D7A8",borderRadius:8,padding:"10px 11px",marginTop:10}}>
              <div style={{fontSize:10.5,fontWeight:700,color:"#8A6D1F",marginBottom:4}}>🔔 Auto-Reminders</div>
              <div style={{fontSize:11,color:"#6B5A2A",lineHeight:1.4}}>Meeting reminder emails — Phase 2.</div>
            </div>
          </div>
        </>}

        {/* PIPELINE VIEW */}
        {view==="pipeline"&&<PipelineView contacts={contacts||[]} users={users} dbUser={dbUser} onSelectContact={c=>{setSelected(c);setView("contacts");}}/>}

        {/* CALENDAR VIEW */}
        {view==="calendar"&&<CalendarView
          activities={activities||[]}
          contacts={contacts||[]}
          users={users}
          dbUser={dbUser}
          onActivityClick={a=>{setShowActivityDetail(a);const contact=contacts?.find(c=>c.id===a.contact_id);if(contact)setSelected(contact);}}
          onNewActivity={()=>setShowNewActivity(true)}
          onReschedule={updated=>setActivities(p=>p.map(a=>a.id===updated.id?updated:a))}
        />}

        {/* OTHER VIEWS */}
        {view!=="contacts"&&view!=="pipeline"&&view!=="calendar"&&(
          <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12}}>
            <div style={{fontSize:38}}>{view==="calls"?"📞":view==="prices"?"🏷️":view==="reports"?"📊":"⚙️"}</div>
            <div style={{fontSize:18,fontWeight:700,color:C.dark,textTransform:"capitalize"}}>{view==="prices"?"Price Lists":view}</div>
            <div style={{fontSize:12.5,color:C.sub,maxWidth:300,textAlign:"center"}}>Coming in Phase 2.</div>
          </div>
        )}
      </div>

      {/* MODALS */}
      {showNewContact&&<NewContactModal userId={dbUser?.id||authUser?.id} users={users}
        onSave={c=>{setContacts(p=>[c,...(p||[])]);setSelected(c);setShowNewContact(false);}}
        onClose={()=>setShowNewContact(false)}/>}

      {showNewActivity&&<NewActivityModal userId={dbUser?.id||authUser?.id} contactId={selected?.id}
        contacts={contacts||[]} users={users}
        onSave={a=>{setActivities(p=>[a,...(p||[])]);setShowNewActivity(false);}}
        onClose={()=>setShowNewActivity(false)}/>}

      {showEmail&&selected&&<EmailModal
        contact={selected}
        dbUser={dbUser}
        onClose={()=>setShowEmail(false)}/>}

      {showRoofProposal&&selected&&<RoofProposalModal
        contact={selected} dbUser={dbUser}
        onSave={()=>setShowRoofProposal(false)}
        onClose={()=>setShowRoofProposal(false)}/>}

      {showMiscProposal&&selected&&<MiscProposalModal
        contact={selected} dbUser={dbUser}
        onSave={()=>setShowMiscProposal(false)}
        onClose={()=>setShowMiscProposal(false)}/>}

      {showGutterProposal&&selected&&<GutterProposalModal
        contact={selected}
        dbUser={dbUser}
        onSave={()=>setShowGutterProposal(false)}
        onClose={()=>setShowGutterProposal(false)}/>}

      {showEditContact&&selected&&<EditContactModal
        contact={selected}
        users={users}
        dbUser={dbUser}
        onSave={updated=>{
          setContacts(p=>p.map(c=>c.id===updated.id?updated:c));
          setSelected(updated);
          setShowEditContact(false);
        }}
        onDelete={id=>{
          setContacts(p=>p.filter(c=>c.id!==id));
          setSelected(null);
          setShowEditContact(false);
        }}
        onClose={()=>setShowEditContact(false)}/>}

      {showReassign&&<ReassignModal contacts={contacts||[]} users={users}
        onSave={()=>{setShowReassign(false);loadAll();}}
        onClose={()=>setShowReassign(false)}/>}

      {showActivityDetail&&<ActivityDetailModal
        activity={showActivityDetail}
        contact={contacts?.find(c=>c.id===showActivityDetail.contact_id)}
        users={users}
        onClose={()=>setShowActivityDetail(null)}
        onComplete={completeActivity}
        onDelete={deleteActivity}
        onEdit={()=>{setShowEditActivity(showActivityDetail);setShowActivityDetail(null);}}/>}

      {showEditActivity&&<EditActivityModal
        activity={showEditActivity}
        contacts={contacts||[]}
        users={users}
        dbUser={dbUser}
        onSave={updated=>{
          setActivities(p=>p.map(a=>a.id===updated.id?updated:a));
          setShowEditActivity(null);
        }}
        onDelete={id=>{
          setActivities(p=>p.filter(a=>a.id!==id));
          setShowEditActivity(null);
        }}
        onClose={()=>setShowEditActivity(null)}/>}

      {showDonePrompt&&(
        <div style={{position:"fixed",inset:0,background:"rgba(46,42,33,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}} onClick={()=>setShowDonePrompt(false)}>
          <div style={{background:C.cream,borderRadius:12,width:340,boxShadow:"0 16px 50px rgba(0,0,0,0.28)",textAlign:"center",padding:"28px 24px"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:36,marginBottom:12}}>✅</div>
            <div style={{fontSize:15,fontWeight:700,color:C.dark,marginBottom:6}}>Activity Complete!</div>
            <div style={{fontSize:12.5,color:C.sub,marginBottom:22}}>Great work! Want to schedule the next step{doneContact?` with ${doneContact.first_name}`:""}?</div>
            <div style={{display:"flex",gap:10}}>
              <Btn primary onClick={()=>{setShowDonePrompt(false);setShowNewActivity(true);}} style={{flex:1,justifyContent:"center"}}>Schedule Next Activity</Btn>
              <Btn onClick={()=>setShowDonePrompt(false)} style={{flex:1,justifyContent:"center"}}>Not Now</Btn>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
